function toNum(s){ return parseInt((s||'0').replace(/,/g,''))||0; }

let currentSort = {col:null, dir:1};

function render(data){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.map(([kw,imp,cat,y,g],i)=>{
    const cc = CAT_COLORS[cat]||'#666';
    const ic = IMP_COLORS[imp]||'#999';
    const gn = toNum(g);
    const bw = Math.min(80, Math.round(gn/180));
    const gColor = gn>=1000?'#0d47a1':gn>=100?'#1565c0':gn>=10?'#1976d2':'#90caf9';
    return `<tr>
      <td class="num">${i+1}</td>
      <td class="kw-cell"><a href="https://www.google.com/search?q=${encodeURIComponent(kw)}" target="_blank">${kw}</a></td>
      <td class="imp" style="color:${ic}">${imp}</td>
      <td><span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}35">${cat}</span></td>
      <td class="vol-cell yahoo-val">${y||'<span class="na">-</span>'}</td>
      <td class="vol-cell google-cell">
        <div class="bar-wrap">
          <div class="bar" style="width:${bw}px;background:linear-gradient(90deg,${gColor},#42a5f5)"></div>
          <span style="color:${gColor}">${g||'<span class="na">-</span>'}</span>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('countLabel').textContent = data.length + '件表示中';
}

function getFiltered(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const imp = document.getElementById('filterImp').value;
  const cat = document.getElementById('filterCat').value;
  const sort = document.getElementById('sortBy').value;

  let d = DATA.filter(([kw,i,c])=>{
    if(q && !kw.toLowerCase().includes(q)) return false;
    if(imp && i!==imp) return false;
    if(cat && c!==cat) return false;
    return true;
  });

  if(sort==='google-desc') d.sort((a,b)=>toNum(b[4])-toNum(a[4]));
  else if(sort==='google-asc') d.sort((a,b)=>toNum(a[4])-toNum(b[4]));
  else if(sort==='yahoo-desc') d.sort((a,b)=>toNum(b[3])-toNum(a[3]));
  else if(sort==='yahoo-asc') d.sort((a,b)=>toNum(a[3])-toNum(b[3]));

  return d;
}

function update(){ render(getFiltered()); }
function resetFilters(){
  document.getElementById('search').value='';
  document.getElementById('filterImp').value='';
  document.getElementById('filterCat').value='';
  document.getElementById('sortBy').value='';
  update();
}

document.getElementById('search').addEventListener('input', update);
document.getElementById('filterImp').addEventListener('change', update);
document.getElementById('filterCat').addEventListener('change', update);
document.getElementById('sortBy').addEventListener('change', update);

render(DATA);
</script>
